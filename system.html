<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống | System Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Cyber<span>Secure</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Trang Chủ</a></li>
                <li><a href="security.html">Bảo Mật</a></li>
                <li><a href="system.html" class="active">Hệ Thống</a></li>
                <li><a href="ai.html">Trí Tuệ Nhân Tạo</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Quản Trị Hệ Thống</h1>
        <div class="system-monitor">
            <div class="progress-container">
                <label>Sử dụng CPU</label>
                <div class="progress-bar"><div class="fill" style="width: 45%;">45%</div></div>
            </div>
            <div class="progress-container">
                <label>Sử dụng RAM</label>
                <div class="progress-bar"><div class="fill" style="width: 72%;">72%</div></div>
            </div>
            <div class="progress-container">
                <label>Băng thông mạng</label>
                <div class="progress-bar"><div class="fill" style="width: 30%;">30%</div></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
